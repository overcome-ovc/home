<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Overcome | Rising Brawl Stars Esports APAC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style/style.css"/>
  <style>
    /* Hero for news.html */
    .hero{
  height: 42vh;
  min-height: 320px;
  max-height: 520px;
  background:
    linear-gradient(rgba(8,12,28,.78), rgba(8,12,28,.88)),
    url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80&w=2000') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 1.5rem;
  margin-top: 6rem;
}
    /* Additional styles for news page */
    .loading {
  text-align:center;
  opacity:.7;
  letter-spacing:1px;
}

.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
  padding:40px 6%;
}

.news-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  display: block;

  transition: transform .4s ease;
}

.news-card{
   background: linear-gradient(
    145deg,
    rgba(20,30,60,0.55),
    rgba(10,15,30,0.65)
  );
  border: 1px solid rgba(89,151,251,0.15);
  border-radius:16px;
  overflow:hidden;
  transition:.25s ease;
  border:1px solid rgba(255,255,255,.06);
}

.news-card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.news-card-content{
  padding:16px;
}

.news-card h3{
  margin:0 0 6px;
  font-size:1.05rem;
}

.news-card small{
  opacity:.6;
}
  </style>
</head>

    <div class="nav-overlay"></div> 
  <header>
    <nav>
  <div class="logo">OVERCOME</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
  </div>

  <div class="nav-toggle">
    <i class="fas fa-bars"></i>
  </div>
</nav>

  </header>
  <div class="nav-panel">
  <div class="nav-close"><i class="fas fa-times"></i></div>

  <a href="index.html/#home">Home</a>
</div>
<main>
  <section class="hero" id="home">
    <div class="hero-content">
      <h1>NEWS</h1>
    </div>
  </section>

  <section id="news-list" class="news-grid">
    <p class="loading">Loading news…</p>
  </section>
</main>
  <footer>
    <p>© 2025–2026 Overcome Esports<br>
    #OvercomeYourLimits • Brawl Stars APAC</p>
  </footer>

<script>
(async function(){
  const repoRawBase = "https://raw.githubusercontent.com/overcome-OVC/home/main/news/";
  const listEl = document.getElementById('news-list');

  try {
    const res = await fetch(repoRawBase + "index.json");
    if (!res.ok) {
      const txt = await res.text();
      console.error("index.json fetch not OK:", res.status, txt);
      listEl.innerHTML = `<p style="color:red;">Failed to load index.json (HTTP ${res.status}).</p>`;
      return;
    }

    // verify content-type or try parse
    const contentType = res.headers.get('content-type') || '';
    let posts;
    if (contentType.includes('application/json')) {
      posts = await res.json();
    } else {
      // try to parse but print raw if fails
      const raw = await res.text();
      try { posts = JSON.parse(raw); }
      catch(e){
        console.error("index.json is not valid JSON. Raw response:", raw);
        listEl.innerHTML = `<p style="color:red;">index.json is invalid JSON — open raw URL in browser to inspect. Check console.</p>`;
        return;
      }
    }

    if (!Array.isArray(posts) || posts.length === 0) {
      listEl.innerHTML = "<p>No news found 😔</p>";
      return;
    }

    // render cards (with image if present)
    listEl.innerHTML = '';
    posts.sort((a,b)=> new Date(b.date) - new Date(a.date));
    posts.forEach((post) => {
      const imgSrc = post.image || 'assets/images/ovc.png'; // fallback
      const card = document.createElement('article');
      card.className = 'news-card';
      card.innerHTML = `
        <a href="post.html?date=${encodeURIComponent(post.date)}" style="display:block;text-decoration:none;color:inherit;">
          <img src="${imgSrc}" alt="${post.title}" style="width:100%;height:160px;object-fit:cover;display:block;">
          <div class="news-card-content">
            <h3>${post.title}</h3>
            <small>${post.date}</small>
          </div>
        </a>
      `;
      listEl.appendChild(card);
    });

  } catch(err) {
    console.error("Fetch error:", err);
    listEl.innerHTML = `<p style="color:red;">Network/error fetching index.json — open console for details.</p>`;
  }
})();
</script>
<script src="scripts/nav.js"></script>
<script src="scripts/day-night.js"></script>
</body>
</html>
